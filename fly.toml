app = "xalquchun-bot"
primary_region = "fra"  # Yevropa serveri

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  # Environment variables bu yerga yoziladi (yoki fly secrets orqali)
  PYTHONUNBUFFERED = "true"
[mounts]
  source = "data"
  destination = "/data"
  
[experimental]
  allowed_public_ports = []
  auto_rollback = true

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443