# fly.toml app configuration file generated for xalquchun-bot-small-bush-7756 on 2026-02-19T21:46:02+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'xalquchun-bot'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PYTHONUNBUFFERED = 'true'

[[mounts]]
  source = 'data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
